<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeVault | Acesso Restrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090b11 0%, #111424 50%, #1a1b35 100%);
            --panel-bg: rgba(20, 24, 46, 0.65);
            --border-color: rgba(99, 102, 241, 0.15);
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --success-color: #10b981;
            --card-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Outfit', sans-serif;
            color: #f8fafc;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            max-width: 400px;
            width: 90%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }

        .login-header {
            background: rgba(30, 27, 75, 0.3);
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            margin-top: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
            opacity: 0.9;
        }

        .login-body {
            padding: 2rem 2.25rem;
        }

        .form-label {
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            display: block;
        }

        .form-control {
            background: rgba(10, 12, 22, 0.6);
            border: 1.5px solid rgba(99, 102, 241, 0.25);
            border-radius: 8px;
            padding: 0.6rem;
            color: #f8fafc;
            font-size: 1.25rem;
            transition: all 0.25s ease;
            letter-spacing: 6px;
        }

        .form-control::placeholder {
            color: #334155;
            letter-spacing: 6px;
        }

        .form-control:focus {
            background: rgba(10, 12, 22, 0.85);
            border-color: var(--accent-secondary);
            box-shadow: 0 0 0 0.15rem rgba(139, 92, 246, 0.25);
            color: #ffffff;
            transform: translateY(-1px);
        }

        .login-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            border: none;
            border-radius: 8px;
            padding: 0.6rem;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .alert {
            border-radius: 8px;
            border: none;
            padding: 0.6rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease;
            text-align: center;
        }

        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border-left: 4px solid #10b981;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-left: 4px solid #ef4444;
        }

        .security-badge {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            border-radius: 20px;
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="d-flex align-items-center justify-content-center">
                <i class="bi bi-shield-fill text-primary" style="font-size: 2.2rem; filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));"></i>
            </div>
            <h1 class="login-title m-0">SafeVault</h1>
            <p class="login-subtitle m-0 mt-1">Acesso Restrito</p>
        </div>

        <div class="login-body text-center">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="security-badge">
                <i class="bi bi-lock-fill me-1"></i>
                Autenticação Necessária
            </div>

            <form action="/login" method="POST">
                <div class="mb-4">
                    <label class="form-label">Digite seu PIN de Segurança</label>
                    <input type="password" name="pin" maxlength="6" inputmode="numeric" pattern="[0-9]*" class="form-control text-center" placeholder="••••" required autocomplete="current-password" autofocus>
                </div>

                <button type="submit" class="login-btn w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i>DESBLOQUEAR
                </button>
            </form>
        </div>
    </div>
</body>
</html>
